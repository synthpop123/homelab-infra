# Komodo Resource Sync — declarative definition of all Stacks (Infrastructure as Code).
#
# A single "Resource Sync" resource in the Komodo UI points at this file. From then on,
# every stack is managed from git: add a service by adding a [[stack]] block here plus a
# stacks/<name>/compose.yaml file, then push.
#
# Division of labour (this is what avoids a double-deploy race):
#   * This sync only reconciles resource *definitions*. Every stack sets `deploy = false`, so the
#     sync NEVER deploys — it just creates/updates the Stack resource in Komodo.
#   * The "Redeploy On Push" procedure at the bottom is the SOLE deployer.
#   (Flip a stack back to deploy = true and the sync's push webhook + the procedure's push webhook
#   would both deploy it at once and collide with "Resource is busy" — which is exactly the bug
#   this layout prevents.)
#
# Stacks reference their git source through `linked_repo` — the name of a Komodo "Repo"
# resource configured in the UI. The git account/repo therefore live in Komodo, not in this
# file, which keeps the repo free of instance-specific details.
#
# Docs: https://komo.do/docs/sync

[[stack]]
name = "wallos"
deploy = false
tags = ["app"]

[stack.config]
server = "Famesystems"
linked_repo = "homelab-infra"
run_directory = "stacks/wallos"
file_paths = ["compose.yaml"]

[[stack]]
name = "calibre-web-automated"
deploy = false
tags = ["app"]

[stack.config]
server = "Famesystems"
linked_repo = "homelab-infra"
run_directory = "stacks/calibre-web-automated"
file_paths = ["compose.yaml"]

[[stack]]
name = "deeix-chat"
deploy = false
tags = ["app"]

[stack.config]
server = "Famesystems"
linked_repo = "homelab-infra"
run_directory = "stacks/deeix-chat"
file_paths = ["compose.yaml"]
# Postgres/Redis passwords come from Komodo Variables, kept out of git. The compose references
# ${DEEIX_POSTGRES_PASSWORD} / ${DEEIX_REDIS_PASSWORD}; Komodo writes them into .env at deploy.
environment = """
DEEIX_POSTGRES_PASSWORD=[[DEEIX_POSTGRES_PASSWORD]]
DEEIX_REDIS_PASSWORD=[[DEEIX_REDIS_PASSWORD]]
"""

[[stack]]
name = "drizzle-gateway"
deploy = false
tags = ["app"]

[stack.config]
server = "Famesystems"
linked_repo = "homelab-infra"
run_directory = "stacks/drizzle-gateway"
file_paths = ["compose.yaml"]
# MASTERPASS comes from a Komodo Variable; the compose references ${DRIZZLE_GATEWAY_MASTERPASS}.
environment = """
DRIZZLE_GATEWAY_MASTERPASS=[[DRIZZLE_GATEWAY_MASTERPASS]]
"""

[[stack]]
name = "cloudreve"
deploy = false
tags = ["app"]

[stack.config]
server = "Famesystems"
linked_repo = "homelab-infra"
run_directory = "stacks/cloudreve"
file_paths = ["compose.yaml"]
# No secrets: the bundled Postgres uses trust auth and Redis has no password.

[[stack]]
name = "koito"
deploy = false
tags = ["app"]

[stack.config]
server = "Famesystems"
linked_repo = "homelab-infra"
run_directory = "stacks/koito"
file_paths = ["compose.yaml"]
# koito + multi-scrobbler secrets and personal info (domain, username) come from Komodo
# Variables; the compose references ${...} placeholders only.
environment = """
KOITO_LASTFM_API_KEY=[[KOITO_LASTFM_API_KEY]]
KOITO_TOKEN=[[KOITO_TOKEN]]
KOITO_USER=[[KOITO_USER]]
SPOTIFY_CLIENT_ID=[[SPOTIFY_CLIENT_ID]]
SPOTIFY_CLIENT_SECRET=[[SPOTIFY_CLIENT_SECRET]]
MS_BASE_URL=[[MS_BASE_URL]]
"""

# ----------------------------------------------------------------------------
# Auto-redeploy on git push (the Renovate flow).
#
# The Resource Sync above only reconciles resource *definitions* (deploy = false);
# it never deploys. This Procedure is the SOLE deployer: on each push it deploys
# ONLY the stacks whose compose content actually changed (a brand-new stack counts
# as changed). One webhook on the repo points here, so it also scales past GitHub's
# 20-webhooks-per-repo limit.
#   Set up its push webhook in the Komodo UI (Procedure page -> copy webhook URL).
# ----------------------------------------------------------------------------
[[procedure]]
name = "Redeploy On Push"
description = "Redeploy stacks whose compose changed in git (Renovate version bumps, etc.)"

[procedure.config]
webhook_enabled = true

[[procedure.config.stage]]
name = "Redeploy changed stacks"
executions = [
  { execution.type = "BatchDeployStackIfChanged", execution.params.pattern = "*" },
]
