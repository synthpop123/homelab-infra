name = "torrent"
deploy = false
tags = ["app"]

[stack.config]
server = "Famesystems"
linked_repo = "homelab-infra"
run_directory = "stacks/torrent"
file_paths = ["compose.yaml"]
# No secrets in compose: the qBittorrent WebUI credentials live in /srv/torrent/qbittorrent/config
# and qui's instance config (incl. the encrypted qBittorrent password) in /srv/torrent/qui/config.
# Own `torrent` network, separate from autobrr's `torrenting` (autobrr left untouched under /opt).

# ----------------------------------------------------------------------------
# Sync-then-deploy on git push (the Renovate flow), as ONE ordered procedure.
#
# A single webhook on the repo points at THIS procedure (the `homelab` sync's own
# webhook is disabled). Stages run sequentially, so each push:
#   Stage 1  RunSync "homelab"                — reconcile resource *definitions*
#            (creates a brand-new stack's resource if this push added one).
#   Stage 2  BatchDeployStackIfChanged "*"    — deploy ONLY the stacks whose compose
#            content changed, including that brand-new stack now that it exists.
# Because stage 2 can't start until stage 1 finishes, a new stack deploys on its FIRST
# push — no manual UI deploy and no empty "trigger" commit. (Renovate tag bumps are just
# the stage-2 path: changed compose -> redeploy.) If stage 1 fails, stage 2 won't run.
#   Set up this procedure's push webhook in the Komodo UI (Procedure page -> copy webhook URL),
#   and make sure the `homelab` ResourceSync's webhook is turned OFF so it doesn't double-run.
# ----------------------------------------------------------------------------
[[procedure]]
name = "Redeploy On Push"
description = "On git push: run the homelab sync (reconcile definitions), then deploy stacks whose compose changed."

[procedure.config]
webhook_enabled = true

[[procedure.config.stage]]
name = "Sync resource definitions"
executions = [
  { execution.type = "RunSync", execution.params.sync = "homelab" },
]

[[procedure.config.stage]]
name = "Redeploy changed stacks"
executions = [
  { execution.type = "BatchDeployStackIfChanged", execution.params.pattern = "*" },
]
