# ${DEEIX_POSTGRES_PASSWORD} / ${DEEIX_REDIS_PASSWORD}; Komodo writes them into .env at deploy.
environment = """
DEEIX_POSTGRES_PASSWORD=[[DEEIX_POSTGRES_PASSWORD]]
