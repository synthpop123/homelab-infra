# Komodo Resource Sync — declarative definition of all Stacks (Infrastructure as Code).
#
# A single "Resource Sync" resource in the Komodo UI points at this file. From then on,
# every stack is managed from git: add a service by adding a [[stack]] block here plus a
# stacks/<name>/compose.yaml file, then push. The sync (re)creates and redeploys as needed.
#
# Stacks reference their git source through `linked_repo` — the name of a Komodo "Repo"
# resource configured in the UI. The git account/repo therefore live in Komodo, not in this
# file, which keeps the repo free of instance-specific details.
#
# Docs: https://komo.do/docs/sync

[[stack]]
name = "wallos"
deploy = true
tags = ["app"]

[stack.config]
server = "Famesystems"
linked_repo = "homelab-infra"
run_directory = "stacks/wallos"
file_paths = ["compose.yaml"]

[[stack]]
name = "calibre-web-automated"
deploy = true
tags = ["app"]

[stack.config]
server = "Famesystems"
linked_repo = "homelab-infra"
run_directory = "stacks/calibre-web-automated"
file_paths = ["compose.yaml"]

# ----------------------------------------------------------------------------
# Auto-redeploy on git push (the Renovate flow).
#
# The Resource Sync above only reconciles resource *definitions*; it does NOT
# redeploy a stack when only its compose file *content* changes (e.g. Renovate
# bumps an image tag). This Procedure does: on each push it redeploys ONLY the
# stacks whose content actually changed. A single webhook on the repo points at
# this procedure, so it scales past GitHub's 20-webhooks-per-repo limit.
#   Set up its push webhook in the Komodo UI (Procedure page -> copy webhook URL).
# ----------------------------------------------------------------------------
[[procedure]]
name = "Redeploy On Push"
description = "Redeploy stacks whose compose changed in git (Renovate version bumps, etc.)"

[procedure.config]
webhook_enabled = true

[[procedure.config.stage]]
name = "Redeploy changed stacks"
executions = [
  { execution.type = "BatchDeployStackIfChanged", execution.params.pattern = "*" },
]
