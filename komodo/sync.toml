# Komodo Resource Sync — declarative definition of all Stacks (Infrastructure as Code).
#
# A single "Resource Sync" resource in the Komodo UI points at this file. From then on,
# every stack is managed from git: add a service by adding a [[stack]] block here plus a
# stacks/<name>/compose.yaml file, then push.
#
# Division of labour (this is what avoids a double-deploy race AND first-push misses):
#   * This sync only reconciles resource *definitions*. Every stack sets `deploy = false`, so the
#     sync NEVER deploys — it just creates/updates the Stack resource in Komodo.
#   * The "Redeploy On Push" procedure at the bottom is the SOLE deployer, and it is the SINGLE
#     git-push entry point: stage 1 runs THIS sync (RunSync), stage 2 deploys what changed. Stages
#     run sequentially, so a brand-new stack's definition exists before the deploy stage runs — it
#     comes up on its FIRST push, no manual UI deploy / empty "trigger" commit needed.
#   * The sync's OWN push webhook is disabled (the procedure runs the sync as stage 1). Having both
#     webhooks fire would run two `homelab` syncs in parallel and fight over the lock.
#   (Flip a stack back to deploy = true and the sync would deploy it too, colliding with the
#   procedure for the stack's deploy lock — "Resource is busy" — which is the bug this layout avoids.)
#
# Stacks reference their git source through `linked_repo` — the name of a Komodo "Repo"
# resource configured in the UI. The git account/repo therefore live in Komodo, not in this
# file, which keeps the repo free of instance-specific details.
#
# Docs: https://komo.do/docs/sync

[[stack]]
name = "wallos"
description = "https://wallos.lkwplus.com"
deploy = false
tags = ["app"]

[stack.config]
server = "Famesystems"
linked_repo = "homelab-infra"
run_directory = "stacks/wallos"
