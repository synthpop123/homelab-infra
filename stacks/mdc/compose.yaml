# mdc (Movie Data Capture): scraper that reads source files from the 115 mount
# (/mnt/CloudNAS/115, provided by the host-networked clouddrive2) and writes nfo/poster/fanart into
# the shared Emby library (/srv/emby/data, mounted as /emby_data) for Emby to read directly. Its own
# config/state lives in /srv/mdc/data.
#
# flaresolverr solves Cloudflare challenges for the scrapers; mdc reaches it in-network at
# http://flaresolverr:8191/v1 (config.json) over this stack's `mdc` network. It is internal-only
# (container mdc-flaresolverr, no published host port) — only mdc uses it. Login creds are Komodo Variables.
services:
  mdc:
    container_name: mdc
    image: mdcng/mdc:v1.36.0
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
      - MDC_USERNAME=${MDC_USERNAME}
      - MDC_PASSWORD=${MDC_PASSWORD}
    volumes:
      - /srv/mdc/data:/config
      - /mnt/CloudNAS/115:/media
      - /srv/emby/data:/emby_data
    ports:
      # host:container — host port from the registry (see docs/ports.md)
      - "20024:9208/tcp"

  flaresolverr:
    container_name: mdc-flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr:v3.5.0
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - LOG_FILE=none
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=Asia/Shanghai
    volumes:
      - /srv/mdc/flaresolver:/config

networks:
  default:
    name: mdc
