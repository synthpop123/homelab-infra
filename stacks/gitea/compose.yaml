# Gitea — self-hosted git. Migrated off the shared Postgres to a dedicated bundled instance.
# All Gitea secrets (SECRET_KEY, INTERNAL_TOKEN, JWT secrets) and the SSH config live in app.ini
# inside the data dir, so /srv/gitea/data must be migrated faithfully. DB password via Komodo Variable.
#
# Ports preserve the existing setup exactly: HTTP on the registry port, SSH host port kept at 222.
# NOTE: the host SSH mapping is 222->11322 as it was before, but app.ini has SSH_LISTEN_PORT=22.
# That mismatch predates this migration (SSH is likely unused — 0 repos); left as-is to avoid a
# behavior change. To actually expose SSH, map "222:22" and set SSH_PORT=222 in app.ini.
services:
  gitea:
    container_name: gitea
    image: gitea/gitea:1.26.2
    restart: unless-stopped
    depends_on:
      gitea-postgres:
        condition: service_healthy
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: gitea-postgres:5432
      GITEA__database__NAME: gitea
      GITEA__database__USER: gitea
      GITEA__database__PASSWD: ${GITEA_DB_PASSWORD}
      DISABLE_REGISTRATION: "true"
    volumes:
      - /srv/gitea/data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      # host:container — HTTP from the registry (see docs/ports.md); SSH host port kept at 222
      - "20018:3000/tcp"
      - "222:11322/tcp"

  gitea-postgres:
    container_name: gitea-postgres
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gitea
      POSTGRES_USER: gitea
      POSTGRES_PASSWORD: ${GITEA_DB_PASSWORD}
    volumes:
      - /srv/gitea/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitea -d gitea"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: gitea
