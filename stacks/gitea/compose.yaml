# Gitea — self-hosted git. Migrated off the shared Postgres to a dedicated bundled instance.
# All Gitea secrets (SECRET_KEY, INTERNAL_TOKEN, JWT secrets) live in app.ini inside the data dir,
# so /srv/gitea/data must be migrated faithfully. DB password via Komodo Variable.
#
# SSH is exposed on host port 222: Gitea listens on container port 22 (its default SSH_LISTEN_PORT),
# and GITEA__server__SSH_PORT=222 makes clone URLs advertise ssh://git@<domain>:222/...
services:
  gitea:
    container_name: gitea
    image: gitea/gitea:1.27.0
    restart: unless-stopped
    depends_on:
      gitea-postgres:
        condition: service_healthy
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: gitea-postgres:5432
      GITEA__database__NAME: gitea
      GITEA__database__USER: gitea
      GITEA__database__PASSWD: ${GITEA_DB_PASSWORD}
      GITEA__server__SSH_PORT: "222"
      DISABLE_REGISTRATION: "true"
    volumes:
      - /srv/gitea/data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      # host:container — HTTP from the registry (see docs/ports.md); SSH host port 222 -> 22
      - "20018:3000/tcp"
      - "222:22/tcp"

  gitea-postgres:
    container_name: gitea-postgres
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gitea
      POSTGRES_USER: gitea
      POSTGRES_PASSWORD: ${GITEA_DB_PASSWORD}
    volumes:
      - /srv/gitea/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitea -d gitea"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: gitea
