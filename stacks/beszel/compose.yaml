# Beszel monitoring: hub (web UI) + agent (collects metrics from this host).
# The agent runs on the host network and talks to the hub; its TOKEN and the hub's public KEY
# are instance-specific and come from Komodo Variables (kept out of git).
services:
  beszel:
    container_name: beszel
    image: henrygd/beszel:0.18.7
    restart: unless-stopped
    ports:
      # host:container — host port from the registry (see docs/ports.md)
      - "20011:8090/tcp"
    volumes:
      - /srv/beszel/hub:/beszel_data
    extra_hosts:
      - host.docker.internal:host-gateway

  beszel-agent:
    container_name: beszel-agent
    image: henrygd/beszel-agent:0.18.7
    restart: unless-stopped
    # Host networking so the agent sees real host interfaces; it listens on host port 45876
    # (fixed, outside the 20xxx scheme) and reaches the hub at localhost.
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /srv/beszel/agent:/var/lib/beszel-agent
    environment:
      LISTEN: 45876
      KEY: ${BESZEL_KEY}
      TOKEN: ${BESZEL_TOKEN}
      HUB_URL: http://localhost:20011

networks:
  default:
    name: beszel
