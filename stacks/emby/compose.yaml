# Emby media server. Reads the shared media library at /srv/emby/data as /data — that folder holds
# the .strm files generated by cloud-media-sync plus the nfo/jpg scraped by mdc (both write into it
# via bind mounts). Emby's own config/database lives in /srv/emby/config.
#
# Stays on the external mediacenter-net at the FIXED IP 172.22.0.4: cloud-media-sync targets exactly
# this address (its EMBY_HOST_PORT=http://172.22.0.4:8096), so the IP must not change. The network is
# created/managed outside this repo (manual `docker network create`), hence external.
services:
  emby:
    container_name: emby
    image: linuxserver/emby:4.9.5.0-ls288
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
    volumes:
      - /srv/emby/config:/config
      - /srv/emby/data:/data
      - /srv/emby/mediainfo:/mediainfo
    ports:
      # host:container — host port from the registry (see docs/ports.md)
      - "20021:8096/tcp"
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      mediacenter-net:
        ipv4_address: 172.22.0.4

networks:
  mediacenter-net:
    external: true
    name: mediacenter-net
