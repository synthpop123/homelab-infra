# Mastodon — web + streaming + sidekiq, backed by Postgres, Redis and Elasticsearch.
#
# Secrets and personal values (domain, S3/R2 creds, app keys, SMTP from-address) come from
# Komodo Variables and are written into a git-ignored .env.production at deploy time — see the
# mastodon [[stack]] block in komodo/sync.toml. The repo holds no instance secrets.
#
# The image version is pinned here (Renovate-managed), replacing the upstream compose's manual
# MASTODON_VERSION .env lever.
services:
  db:
    container_name: mastodon-db
    # Pinned to the major line (14); a major upgrade needs a manual pg_upgrade.
    image: postgres:14-alpine
    shm_size: 256mb
    restart: unless-stopped
    networks:
      - internal_network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
    volumes:
      - /srv/mastodon/postgres:/var/lib/postgresql/data
    environment:
      - "POSTGRES_HOST_AUTH_METHOD=trust"

  redis:
    container_name: mastodon-redis
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
    volumes:
      - /srv/mastodon/redis:/data

  es:
    container_name: mastodon-es
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.3
    restart: unless-stopped
    environment:
      # Auth is intentionally disabled (xpack.security.enabled=false) — ES is internal-only (no host
      # port), reachable only by mastodon on the docker networks — so no ELASTIC_PASSWORD is set.
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m -Des.enforce.bootstrap.checks=true"
      - "xpack.license.self_generated.type=basic"
      - "xpack.security.enabled=false"
      - "xpack.watcher.enabled=false"
      - "xpack.graph.enabled=false"
      - "xpack.ml.enabled=false"
      - "bootstrap.memory_lock=true"
      - "cluster.name=es-mastodon"
      - "discovery.type=single-node"
      - "thread_pool.write.queue_size=1000"
    networks:
      - external_network
      - internal_network
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail localhost:9200/_cluster/health || exit 1"]
    volumes:
      - /srv/mastodon/elasticsearch:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

  web:
    container_name: mastodon-web
    image: ghcr.io/mastodon/mastodon:v4.6.2
    restart: unless-stopped
    env_file: .env.production
    command: bundle exec puma -C config/puma.rb
    networks:
      - external_network
      - internal_network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --proxy=off localhost:3000/health || exit 1"]
    ports:
      # host:container — host port from the registry (see docs/ports.md)
      - "20009:3000/tcp"
    depends_on:
      - db
      - redis
      - es
    volumes:
      - /srv/mastodon/public/system:/mastodon/public/system

  streaming:
    container_name: mastodon-streaming
    image: ghcr.io/mastodon/mastodon-streaming:v4.6.2
    restart: unless-stopped
    env_file: .env.production
    command: node ./streaming/index.js
    networks:
      - external_network
      - internal_network
    healthcheck:
      test: ["CMD-SHELL", "curl -s --noproxy localhost localhost:4000/api/v1/streaming/health | grep -q 'OK' || exit 1"]
    ports:
      # host:container — host port from the registry (see docs/ports.md)
      - "20010:4000/tcp"
    depends_on:
      - db
      - redis

  sidekiq:
    container_name: mastodon-sidekiq
    image: ghcr.io/mastodon/mastodon:v4.6.2
    restart: unless-stopped
    env_file: .env.production
    command: bundle exec sidekiq
    depends_on:
      - db
      - redis
    networks:
      - external_network
      - internal_network
    volumes:
      - /srv/mastodon/public/system:/mastodon/public/system
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q '[s]idekiq' || exit 1"]

networks:
  # Two networks (upstream design): internal_network is isolated (no egress) for db/redis;
  # external_network gives web/streaming/sidekiq/es internet access. Named explicitly to avoid
  # the auto-generated "<project>_default".
  external_network:
    name: mastodon-external
  internal_network:
    name: mastodon-internal
    internal: true
