# n8n — workflow automation, migrated off the shared Postgres to a dedicated bundled instance.
# The n8n encryption key is stored inside the .n8n data dir (/srv/n8n/data), NOT in env, so that
# dir must be migrated faithfully (uid 1000, config 0600). DB password comes from a Komodo Variable.
#
# postgres:18 changed the data layout: PGDATA defaults to /var/lib/postgresql/18/docker and the
# volume mount point is the parent /var/lib/postgresql (so bind that, not /var/lib/postgresql/data).
services:
  n8n:
    container_name: n8n
    image: docker.n8n.io/n8nio/n8n:2.28.1
    restart: unless-stopped
    depends_on:
      n8n-postgres:
        condition: service_healthy
    ports:
      # host:container — host port from the registry (see docs/ports.md)
      - "20014:5678/tcp"
    volumes:
      - /srv/n8n/data:/home/node/.n8n
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_HIRING_BANNER_ENABLED: "false"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      GENERIC_TIMEZONE: Asia/Shanghai
      VUE_APP_URL_BASE_API: ${N8N_URL_BASE_API}

  n8n-postgres:
    container_name: n8n-postgres
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD}
    volumes:
      - /srv/n8n/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: n8n
