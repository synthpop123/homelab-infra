# Immich — photo/video backup. Server + machine-learning + Valkey + the special VectorChord
# Postgres (pinned by digest exactly as Immich ships it; a DB-image change needs Immich's
# documented migration). DB password comes from a Komodo Variable, written into a git-ignored
# .env at deploy; the version is pinned here (replacing Immich's IMMICH_VERSION=release lever).
#
# Service names `redis` and `database` are kept so Immich's built-in DB_HOSTNAME/REDIS_HOSTNAME
# defaults resolve; only container_names are normalized to hyphens.
services:
  immich-server:
    container_name: immich-server
    image: ghcr.io/immich-app/immich-server:v2.7.5
    volumes:
      - /srv/immich/library:/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      # host:container — host port from the registry (see docs/ports.md)
      - "20012:2283/tcp"
    depends_on:
      - redis
      - database
    restart: unless-stopped
    healthcheck:
      disable: false
    labels:
      - com.centurylinklabs.watchtower.enable=false

  immich-machine-learning:
    container_name: immich-machine-learning
    image: ghcr.io/immich-app/immich-machine-learning:v2.7.5
    volumes:
      - /srv/immich/model-cache:/cache
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      disable: false
    labels:
      - com.centurylinklabs.watchtower.enable=false

  redis:
    container_name: immich-redis
    image: docker.io/valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
    healthcheck:
      test: redis-cli ping || exit 1
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=false

  database:
    container_name: immich-postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - /srv/immich/postgres:/var/lib/postgresql/data
    shm_size: 128mb
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=false

networks:
  default:
    name: immich
