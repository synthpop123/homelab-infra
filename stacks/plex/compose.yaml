# Plex stack — Plex media server + Tautulli (Plex monitoring/stats).
#
# Plex shares Emby's .strm libraries: mounts /srv/emby/data/{Movie,TV,JAV,Hentai} (the strm trees
# cloud-media-sync writes) read-only as /data/{Movie,TV,JAV,Hentai}. Movie/TV are scraped with Plex's
# own online agent; JAV and Hentai are "Plex NFO Movie" agent libraries (PMS >= 1.43.1) built entirely
# from the nfo/poster files mdc writes next to each .strm — no online matching. Plex can't
# natively play .strm, so playback is intercepted by the medialinker stack (nginx+njs reverse proxy)
# which 302-redirects to the cms.lkwplus.com direct-link service — the same path Emby already uses,
# which is why no MoviePilot is needed. Plex's own config/database lives in /srv/plex/config.
#
# Tautulli monitors Plex; point it at http://172.22.0.7:32400 (or plex:32400 in-network). Config lives
# in /srv/plex/tautulli/config. Fronted by https://tautulli.lkwplus.com (reverse proxy off-repo).
#
# Kometa manages Plex metadata/collections (per-country collections + Cannes awards). It only makes
# outbound calls — Plex at 172.22.0.7:32400 over mediacenter-net and TMDb — so it needs no host port,
# no fixed IP and no media mounts. Its whole config.yml carries the Plex token + TMDb key, so the real
# file lives off-git at /srv/plex/kometa/config/config.yml (a sanitized kometa-config.yml.example is
# committed). Kometa runs on a daily schedule (KOMETA_TIMES), not on every container start.
#
# letterboxd-plex-sync mirrors Letterboxd → Plex one-way on a weekly cron (Monday 10:00 local):
# watched status, ratings and the watchlist (custom lists unsupported upstream; the optional Radarr
# integration stays off by default). Outbound-only like Kometa (Plex at 172.22.0.7:32400, plex.tv,
# letterboxd.com, TMDb) — no host port, no fixed IP. PLEX_LIBRARY_NAME pins it to the 电影 library:
# left unset, the script walks EVERY movie-type library, i.e. it would pointlessly crawl the
# JAV/Hentai NFO libraries (whose NFO GUIDs can never match Letterboxd's TMDB ids) each weekly run. RUN_NOW=false so container (re)starts never
# trigger a sync; the first run is kicked off manually after deploy:
#   docker exec -d letterboxd-plex-sync /app/sync_job_wrapper.sh   (watch: docker logs -f letterboxd-plex-sync)
# /srv/plex/letterboxd-sync caches the Letterboxd-URL→TMDB-id map — the first build crawls ~15 s
# per film (hours for a large history), weekly runs only map new films. The image is built locally
# from ./letterboxd-sync: the upstream image (digest-pinned in that Dockerfile, still Renovate-
# tracked) plus a curl_cffi patch that gets logins past Letterboxd's Cloudflare TLS-fingerprint
# wall — the stock cloudscraper session 403s (upstream issue #18). Letterboxd credentials, the
# Plex token and the TMDB key are LETTERBOXD_* Komodo Variables.
#
# On the external mediacenter-net at the FIXED IP 172.22.0.7 so medialinker reaches it at
# 172.22.0.7:32400 (plexHost in medialinker's constant.js). The network is created/managed outside
# this repo (manual `docker network create`), hence external.
#
# PLEX_CLAIM is the first-run activation token from https://www.plex.tv/claim (valid ~4 min); it's a
# Komodo Variable and can be cleared once the server is claimed. VERSION=docker pins Plex to the
# image tag (no self-update) so version is driven by the tag + Renovate, like the other stacks.
services:
  plex:
    container_name: plex
    image: linuxserver/plex:1.43.2.10687-563d026ea-ls311
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM}
    volumes:
      - /srv/plex/config:/config
      - /srv/emby/data/Movie:/data/Movie:ro
      - /srv/emby/data/TV:/data/TV:ro
      - /srv/emby/data/JAV:/data/JAV:ro
      - /srv/emby/data/Hentai:/data/Hentai:ro
    ports:
      # host:container — host port from the registry (see docs/ports.md). Clients play through
      # medialinker, not this port; it stays for admin and is Akko-only at the firewall.
      - "20031:32400/tcp"
    networks:
      mediacenter-net:
        ipv4_address: 172.22.0.7

  tautulli:
    container_name: tautulli
    image: ghcr.io/tautulli/tautulli:v2.17.2
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
    volumes:
      - /srv/plex/tautulli/config:/config
    ports:
      # host:container — host port from the registry (see docs/ports.md). tautulli.lkwplus.com
      - "20033:8181/tcp"
    networks:
      mediacenter-net:
        ipv4_address: 172.22.0.9

  kometa:
    container_name: kometa
    image: linuxserver/kometa:v2.4.4-ls106
    restart: unless-stopped
    depends_on:
      - plex
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
      # Daily run time(s) only — Kometa is a batch job, not a server (comma-separate for multiple).
      # 08:30 stays clear of Plex's 04:00-08:00 maintenance window (Butler DB optimize / deep
      # analysis contend for the Plex DB and made runs 3x slower). KOMETA_RUN stays False so it
      # does NOT run on container start; it waits for the schedule (the first run is triggered
      # manually once right after deploy).
      - KOMETA_TIMES=08:30
      - KOMETA_RUN=False
    volumes:
      - /srv/plex/kometa/config:/config
    networks:
      # Outbound only (Plex 172.22.0.7:32400 + TMDb); no fixed IP or host port needed.
      - mediacenter-net

  letterboxd-plex-sync:
    container_name: letterboxd-plex-sync
    # Built locally from ./letterboxd-sync (upstream image + Cloudflare TLS-fingerprint patch —
    # see that Dockerfile); the stack deploys with `--build` (komodo/sync.toml).
    build: ./letterboxd-sync
    restart: unless-stopped
    depends_on:
      - plex
    environment:
      - TZ=Asia/Shanghai
      - PLEX_BASEURL=http://172.22.0.7:32400
      - PLEX_TOKEN=${LETTERBOXD_PLEX_TOKEN}
      # Only sync the 电影 library — see header (keeps the JAV/Hentai NFO libraries out).
      - PLEX_LIBRARY_NAME=电影
      - LB_USERNAME=${LETTERBOXD_USERNAME}
      - LB_PASSWORD=${LETTERBOXD_PASSWORD}
      - TMDB_API_KEY=${LETTERBOXD_TMDB_API_KEY}
      # Monday 10:00 (container runs on Asia/Shanghai via TZ + the /etc/localtime mount).
      # RUN_NOW=false: syncs only on schedule, never on container start (see header).
      - CRON_SCHEDULE=0 10 * * 1
      - RUN_NOW=false
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /srv/plex/letterboxd-sync:/app/data
    networks:
      # Outbound only (Plex, plex.tv, letterboxd.com, TMDb); no fixed IP or host port needed.
      - mediacenter-net

networks:
  mediacenter-net:
    external: true
    name: mediacenter-net
